<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyButler - 당신의 손 안의 개인 자산관리사</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="hero">
        <div class="container">
            <div class="urgency-banner">
                <span>🔥 얼리버드 선착순 100명 한정</span>
            </div>

            <h1 class="hero-title">
                재테크, 이제<br>
                <span class="highlight-gold">게임처럼 재미있게</span>
            </h1>
            
            <p class="hero-subtitle">
                부자들만 누리던 PB(개인 자산관리사)를<br>
                이제 월 <span class="price-highlight">4,950원</span>에 손 안에서
            </p>

            <button class="cta-button">
                선착순 100명 사전 신청하기 →
            </button>

            <p class="hero-subtext">
                선착순 100명 한정 <span class="gold-text">5,000원 리워드 지급</span><br>
                <small>2026년 3월 정식 출시 예정</small>
            </p>
        </div>
    </section>

    <section class="signup-section">
        <div class="container">
            <h2>지금 시작하지 않으면<br><span class="highlight-gold">₩125,000을 놓칩니다</span></h2>
            
            <form class="signup-form">
                <input type="text" placeholder="이름" required>
                <input type="email" placeholder="이메일 주소" required>
                <button type="submit">사전 신청 완료하기</button>
            </form>

            <p class="form-note">
                ✅ 선착순 100명 한정 5,000원 리워드<br>
                ✅ 평생 50% 할인 (월 4,950원)<br>
                ✅ 프리미엄 3개월 무료
            </p>
        </div>
    </section>
</body>
</html>
